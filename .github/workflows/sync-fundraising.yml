name: Sync fondsenwerving (KOTK)

on:
  schedule:
    # Elke 6 uur (sluit aan bij de cache-eis van minstens 6 uur).
    # Pas de frequentie hier aan indien gewenst, bv. "0 * * * *" = elk uur,
    # "0 6 * * *" = één keer per dag om 06:00 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch:

# Nodig om het bijgewerkte bedrag terug te committen.
permissions:
  contents: write

concurrency:
  group: sync-fundraising
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests (parsing)
        run: npm test

      - name: Bedrag ophalen van Kom op tegen Kanker
        run: node scripts/sync-fundraising.mjs

      - name: Committen indien gewijzigd
        run: |
          if git diff --quiet -- src/data/fundraising.json; then
            echo "Geen wijziging aan fundraising.json — niets te committen."
          else
            git config user.name "sterkste-boom-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/fundraising.json
            git commit -m "chore: sync fondsenwerving vanaf Kom op tegen Kanker"
            git push
            echo "Bijgewerkt bedrag gepusht — de deploy-workflow publiceert de nieuwe versie."
          fi
