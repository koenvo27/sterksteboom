name: Sync fondsenwerving (KOTK)

on:
  schedule:
    # Elk uur op het hele uur (UTC). GitHub kan geplande runs wat vertragen.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      amount:
        description: "Handmatig bedrag in euro (bv. 3125 of 3125,50). Leeg = automatisch ophalen van KOTK."
        required: false
        default: ""

# contents: write  -> om het bijgewerkte bedrag terug te committen
# actions: write   -> om daarna de deploy-workflow te starten (pushes met
#                     GITHUB_TOKEN triggeren zelf geen workflows)
permissions:
  contents: write
  actions: write

concurrency:
  group: sync-fundraising
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Tests (parsing)
        run: npm test

      # Echte browser voor de ophaalroute (Playwright/Chromium). Niet in
      # package.json om de site-dependencies licht te houden; enkel hier nodig.
      - name: Echte browser installeren (Playwright)
        run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium

      - name: Bedrag ophalen van Kom op tegen Kanker
        run: node scripts/sync-fundraising.mjs
        env:
          # Leeg bij een geplande run (automatisch ophalen); ingevuld bij een
          # handmatige run via de "Run workflow"-knop.
          KOTK_MANUAL_AMOUNT: ${{ github.event.inputs.amount }}

      - name: Committen indien gewijzigd
        run: |
          if git diff --quiet -- src/data/fundraising.json; then
            echo "Geen wijziging aan fundraising.json — niets te committen."
          else
            git config user.name "sterkste-boom-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/fundraising.json
            git commit -m "chore: sync fondsenwerving vanaf Kom op tegen Kanker"
            git push
            echo "Bijgewerkt bedrag gepusht — deploy-workflow wordt gestart."
            # Pushes met GITHUB_TOKEN triggeren zelf geen workflows; start de
            # deploy daarom expliciet (workflow_dispatch is daarop de uitzondering).
            gh workflow run deploy.yml --ref "$GITHUB_REF_NAME"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
