name: Deploy naar GitHub Pages

on:
  push:
    branches:
      # main = primaire productiebranch. Maak main de default branch van de
      # repo (Settings → Branches) zodat GitHub Pages hiervanaf deployt.
      - main
      # De oorspronkelijke werkbranch blijft voorlopig aanvullend ondersteund
      # zodat de site blijft deployen tot main als default is ingesteld. Deze
      # regel mag verwijderd worden zodra main de default branch is.
      - claude/sterksteboom-github-deploy-aw4yyb
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Slechts één deploy tegelijk; lopende runs niet afbreken.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tests draaien vóór de build: een mislukte test stopt de job, dus een
      # kapotte versie wordt nooit gepubliceerd.
      - name: Tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Schakelt GitHub Pages automatisch in als dat nog niet gebeurd is.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
